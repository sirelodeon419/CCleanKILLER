name: Bug Report
description: Report unexpected behaviour or a failed removal
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please fill in as much detail as possible — it helps a lot.

  - type: input
    id: version
    attributes:
      label: CCleanKILLER version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "e.g. Windows 11 23H2 (22631.4602)"
    validations:
      required: true

  - type: dropdown
    id: build-type
    attributes:
      label: How did you run it?
      options:
        - Portable .exe (downloaded from Releases)
        - NSIS installer
        - From source (pnpm dev / pnpm dist)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include what you expected vs. what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch CCleanKILLER as Administrator
        2. Click Scan
        3. ...
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Removal log (if applicable)
      description: Paste the exported log here. Use the "Export Log" button on the completion screen.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, installed CCleaner version, antivirus software active, etc.
